  <text x="600" y="410" text-anchor="middle" fill="#A1A1AA" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="26" letter-spacing="5">COGNITIVE MODE</text>
  <text x="600" y="524" text-anchor="middle" fill="#FAFAFA" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="64" font-weight="700">Pause before AI.</text>
  <text x="600" y="592" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34">A local-first Hypothesis Gate</text>
  <text x="600" y="637" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34">for deliberate AI workflows.</text>
  <rect x="290" y="744" width="620" height="88" rx="22" fill="#09090B" stroke="#27272A"/>
  <text x="336" y="799" fill="#A1A1AA" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="28">What is your hypothesis?</text>
  <rect x="760" y="778" width="46" height="18" rx="9" fill="#34D399" fill-opacity="0.18"/>
  <circle cx="793" cy="787" r="6" fill="#34D399"/>
  <text x="600" y="928" text-anchor="middle" fill="#71717A" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">100% local. Zero servers. Your thoughts stay yours.</text>
  <defs>
    <filter id="glow" x="558" y="336" width="84" height="84" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.203922 0 0 0 0 0.827451 0 0 0 0 0.6 0 0 0 1 0"/>
      <feBlend mode="normal" in2="BackgroundImageFix" result="effect1_dropShadow"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect1_dropShadow" result="shape"/>
    </filter>
  </defs>
